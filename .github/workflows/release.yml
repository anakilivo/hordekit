name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --dev

    - name: Ruff lint
      run: uv run ruff check hordekit/ tests/

    - name: Mypy
      run: uv run mypy hordekit/

    - name: Bandit
      run: uv run bandit -r hordekit/ -c pyproject.toml

    - name: Tests
      run: uv run pytest tests/ -v

    - name: Build package
      run: uv run python -m build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
